<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>street-by-street &middot; Tutrakan</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>street-by-street &middot; Tutrakan</h1>
    <p class="app-header__subtitle">A street-level civic audit, one street at a time.</p>
  </header>

  <main class="app-main">
    <div id="map"></div>

    <aside id="street-panel" class="street-panel street-panel--empty">
      <p class="street-panel__placeholder">
        Click a highlighted street to see its audit record.
      </p>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
